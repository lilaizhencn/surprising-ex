server:
  port: 9094

spring:
  application:
    name: surprising-gateway-provider
  main:
    keep-alive: true
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  gateway:
    security:
      user-id-header: X-User-Id
      require-identity-for-private-routes: true
      allow-user-id-header-fallback: true
      admin-roles:
        - SUPPORT
        - ADMIN
        - SUPER_ADMIN
      admin-ip-allowlist: []
      require-approval-for-high-risk-admin-writes: true
      admin-approval-header: X-Admin-Approval-Id
      admin-approval-ttl: 30m
      require-admin-mfa: false
      mfa-secret-encryption-key: ${GATEWAY_MFA_SECRET_ENCRYPTION_KEY:}
      issuer: surprising-ex-gateway
      jwt-secret: local-dev-change-me-surprising-ex-gateway-secret-2026
      access-token-ttl: 30m
      refresh-token-ttl: 30d
    http-client:
      connect-timeout: 1s
      read-timeout: 30s
    routes:
      instrument:
        base-url: http://localhost:9080
        target-prefix: /api/v1/instruments
        private-route: false
      candlestick:
        base-url: http://localhost:9081
        target-prefix: /api/v1/candlestick
        private-route: false
        product-routes:
          SPOT:
            base-url: ${GATEWAY_ROUTE_CANDLESTICK_SPOT_BASE_URL:}
          LINEAR_PERPETUAL:
            base-url: ${GATEWAY_ROUTE_CANDLESTICK_LINEAR_PERPETUAL_BASE_URL:}
          INVERSE_PERPETUAL:
            base-url: ${GATEWAY_ROUTE_CANDLESTICK_INVERSE_PERPETUAL_BASE_URL:}
          LINEAR_DELIVERY:
            base-url: ${GATEWAY_ROUTE_CANDLESTICK_LINEAR_DELIVERY_BASE_URL:}
          INVERSE_DELIVERY:
            base-url: ${GATEWAY_ROUTE_CANDLESTICK_INVERSE_DELIVERY_BASE_URL:}
          OPTION:
            base-url: ${GATEWAY_ROUTE_CANDLESTICK_OPTION_BASE_URL:}
      price-index:
        base-url: http://localhost:9082
        target-prefix: /api/v1/price/index
        private-route: false
