    observability:
      kafka:
        enabled: ${ADMIN_KAFKA_LAG_ENABLED:false}
        bootstrap-servers: ${ADMIN_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        client-id: surprising-gateway-admin-monitor
        product-line: LINEAR_PERPETUAL
        product-topics-enabled: false
        request-timeout: 3s
        max-partitions-per-group: 200
        consumer-groups:
          - group-id: surprising-matching-v1
            topics:
              - surprising.perp.order.commands.v1
          - group-id: surprising-account-v1
            topics:
              - surprising.perp.match.trades.v1
          - group-id: surprising-risk-v1
            topics:
              - surprising.account.position.events.v1
          - group-id: surprising-liquidation-v1
            topics:
              - surprising.perp.liquidation.candidates.v1
              - surprising.perp.match.results.v1
          - group-id: surprising-trigger-v1
            topics:
              - surprising.perp.mark.price.v1
          - group-id: surprising-mark-price-v1
            topics:
              - surprising.perp.index.price.v1
              - surprising.perp.book.ticker.v1
              - surprising.perp.trade.events.v1
              - surprising.perp.funding.rate.v1
          - group-id: surprising-insurance-v1
            topics:
              - surprising.account.liquidation-fee.events.v1
      web-socket:
        enabled: true
        admin-route: websocket-admin
      prometheus:
        enabled: true
        sample-preview-limit: 8
        max-body-bytes: 1000000
    alerts:
      delivery-worker:
        enabled: ${ADMIN_ALERT_DELIVERY_WORKER_ENABLED:true}
        initial-delay-ms: ${ADMIN_ALERT_DELIVERY_WORKER_INITIAL_DELAY_MS:5000}
        poll-delay-ms: ${ADMIN_ALERT_DELIVERY_WORKER_POLL_DELAY_MS:2000}
        batch-size: ${ADMIN_ALERT_DELIVERY_WORKER_BATCH_SIZE:25}
        max-attempts: ${ADMIN_ALERT_DELIVERY_WORKER_MAX_ATTEMPTS:5}
        retry-delay: ${ADMIN_ALERT_DELIVERY_WORKER_RETRY_DELAY:30s}
        claim-lease: ${ADMIN_ALERT_DELIVERY_WORKER_CLAIM_LEASE:2m}
        max-error-message-length: 500
    query-tasks:
      max-active-per-user: ${ADMIN_QUERY_TASK_MAX_ACTIVE_PER_USER:3}
      max-active-global: ${ADMIN_QUERY_TASK_MAX_ACTIVE_GLOBAL:25}
      max-created-per-user-in-window: ${ADMIN_QUERY_TASK_MAX_CREATED_PER_USER_IN_WINDOW:20}
      creation-window: ${ADMIN_QUERY_TASK_CREATION_WINDOW:1h}
      max-retained-result-bytes: ${ADMIN_QUERY_TASK_MAX_RETAINED_RESULT_BYTES:50000000}
      archive-expired-on-create: ${ADMIN_QUERY_TASK_ARCHIVE_EXPIRED_ON_CREATE:true}
      archive-batch-size: ${ADMIN_QUERY_TASK_ARCHIVE_BATCH_SIZE:500}
    reports:
      account-asset-snapshots:
        scheduler-enabled: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_SCHEDULER_ENABLED:true}
        initial-delay-ms: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_INITIAL_DELAY_MS:15000}
        poll-delay-ms: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_POLL_DELAY_MS:60000}
        valuation-asset: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_VALUATION_ASSET:USDT}
        snapshot-hour-utc: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_HOUR_UTC:0}
        snapshot-minute-utc: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_MINUTE_UTC:5}
        snapshot-date-offset-days: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_DATE_OFFSET_DAYS:1}
        discrepancy-threshold-ppm: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_DISCREPANCY_THRESHOLD_PPM:100000}
        discrepancy-min-absolute-value: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_DISCREPANCY_MIN_ABSOLUTE_VALUE:0}
        discrepancy-limit: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_DISCREPANCY_LIMIT:20}
        discrepancy-severity: ${ADMIN_ACCOUNT_ASSET_SNAPSHOT_DISCREPANCY_SEVERITY:WARN}
