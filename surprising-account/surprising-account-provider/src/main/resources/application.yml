server:
  port: 9086

spring:
  application:
    name: surprising-account-provider
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  account:
    kafka:
      bootstrap-servers: localhost:9092
      group-id: surprising-account-v1
      match-trades-topic: surprising.perp.match.trades.v1
      order-commands-topic: surprising.perp.order.commands.v1
      order-events-topic: surprising.perp.order.events.v1
      position-events-topic: surprising.account.position.events.v1
      concurrency: 2
    outbox:
      batch-size: 200
      publish-delay-ms: 200
      send-timeout: 3s
