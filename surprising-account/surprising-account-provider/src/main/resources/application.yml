server:
  port: 9086

spring:
  application:
    name: surprising-account-provider
  threads:
    virtual:
      enabled: true
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: account-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: ${ACCOUNT_DB_URL:jdbc:postgresql://localhost:5432/surprising_exchange}
    username: ${ACCOUNT_DB_USERNAME:surprising}
    password: ${ACCOUNT_DB_PASSWORD:surprising}
    hikari:
      maximum-pool-size: ${ACCOUNT_DB_MAX_POOL_SIZE:40}
      minimum-idle: ${ACCOUNT_DB_MIN_IDLE:8}
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:1s}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  price:
    consumer:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      topic: surprising.perp.mark.price.v1
      group-id: surprising-account-mark-price-${HOSTNAME:${random.uuid}}
      max-age: 5s
      allowed-future-skew: 1s
      concurrency: 1
      max-poll-records: 500
  account:
    kafka:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      group-id: surprising-account-v1
      client-id: surprising-account-${HOSTNAME:${random.uuid}}
      order-commands-topic: surprising.perp.order.commands.v1
      order-events-topic: surprising.perp.order.events.v1
      position-events-topic: surprising.account.position.events.v1
      liquidation-fee-events-topic: surprising.account.liquidation-fee.events.v1
      trigger-order-events-topic: surprising.perp.trigger-order.events.v1
      delivery-settlements-topic: surprising.linear-delivery.delivery.settlements.v1
      option-exercises-topic: surprising.option.option.exercises.v1
      concurrency: 2
      user-command-concurrency: ${ACCOUNT_USER_COMMAND_CONCURRENCY:32}
      max-poll-records: 500
    outbox:
      batch-size: 1000
      publish-delay-ms: 20
      async-enabled: true
      max-in-flight: 32
      max-rows-per-key: 32
      send-window-size: 5
      send-timeout: 3s
      retention: 7d
      cleanup-delay-ms: 60000
      cleanup-batch-size: 10000
      cleanup-max-batches: 10
    cache:
      contract-spec-max-entries: 4096
      instrument-type-max-entries: 4096
      spot-instrument-spec-max-entries: 4096
      liquidation-fee-context-max-entries: 200000
    position-cache:
      key-prefix: ${POSITION_REDIS_KEY_PREFIX:surprising:position:v1}
      rebuild-batch-size: 1000
      reconcile-delay-ms: 10000
      ready-ttl: 30s
      lock-ttl: 30s
      accelerator-threads: 4
      accelerator-queue-capacity: 10000
    position-margin:
      max-risk-snapshot-age: 10s
      removal-buffer-ppm: 50000
    trade-settlement:
      stale-after: 1m
    command-wait:
      timeout: 10s
      poll-delay-ms: 20
