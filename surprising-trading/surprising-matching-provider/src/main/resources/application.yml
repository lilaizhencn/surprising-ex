server:
  port: 9085

spring:
  application:
    name: surprising-matching-provider
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: matching-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange?reWriteBatchedInserts=true
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  price:
    consumer:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      topic: surprising.perp.mark.price.v1
      group-id: surprising-matching-mark-price-${HOSTNAME:${random.uuid}}
      max-age: 5s
      allowed-future-skew: 1s
      concurrency: 1
      max-poll-records: 500
  trading:
    matching:
      kafka:
        bootstrap-servers: localhost:9092
        product-line: LINEAR_PERPETUAL
        product-topics-enabled: false
        group-id: surprising-matching-v1
        client-id: surprising-matching-${HOSTNAME:${random.uuid}}
        order-commands-topic: surprising.perp.order.commands.v1
        match-results-topic: surprising.perp.match.results.v1
        match-trades-topic: surprising.perp.match.trades.v1
        order-book-depth-topic: surprising.perp.orderbook.depth.v1
        concurrency: ${MATCHING_KAFKA_CONCURRENCY:4}
        max-poll-records: ${MATCHING_MAX_POLL_RECORDS:16}
        restart-on-partition-reassignment: true
        partition-assignment-startup-grace-ms: 30000
      engine:
        exchange-id: surprising-perp
        matching-engines: ${MATCHING_ENGINE_SHARDS:4}
        risk-engines: ${MATCHING_RISK_SHARDS:2}
        order-book-depth-for-post-only: 1
        order-book-depth-levels: 50
        initial-symbol-refresh-delay-ms: 30000
      recovery:
        open-order-book-restore-enabled: true
        open-order-batch-size: 10000
      protection:
        self-trade-prevention-enabled: true
        internal-market-maker-user-ids: [900001, 900002, 910001]
        market-max-slippage-ppm: 10000
        market-max-mark-age-ms: 5000
      market-data:
        enabled: true
        batch-size: 512
        max-in-flight: 256
        publish-delay-ms: 5
        max-block-ms: 5
        delivery-timeout-ms: 500
        request-timeout-ms: 300
        linger-ms: 10
        producer-batch-size: 65536
        buffer-memory-bytes: 33554432
    outbox:
      batch-size: 1000
      publish-delay-ms: 20
      async-enabled: true
      max-in-flight: 64
      send-timeout: 3s
      retention: 7d
      cleanup-delay-ms: 60000
      cleanup-batch-size: 10000
      cleanup-max-batches: 10
