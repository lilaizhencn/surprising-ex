server:
  port: 9084

spring:
  application:
    name: surprising-order-provider
  task:
    scheduling:
      pool:
        size: 6
      thread-name-prefix: order-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  price:
    consumer:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      topic: surprising.perp.mark.price.v1
      group-id: surprising-order-mark-price-${HOSTNAME:${random.uuid}}
      max-age: 15s
      allowed-future-skew: 1s
      concurrency: 1
      max-poll-records: 500
  clients:
    trigger:
      base-url: http://localhost:9095
  trading:
    order:
      kafka:
        bootstrap-servers: localhost:9092
        product-line: LINEAR_PERPETUAL
        product-topics-enabled: false
        order-commands-topic: surprising.perp.order.commands.v1
        order-events-topic: surprising.perp.order.events.v1
    outbox:
      batch-size: 1000
      publish-delay-ms: 20
      async-enabled: true
      max-in-flight: 64
      send-timeout: 3s
      risk:
        market-max-slippage-ppm: 10000
        market-max-mark-age-ms: 5000
        limit-price-protection-enabled: true
        limit-price-band-ppm: 50000
        limit-price-max-mark-age-ms: 15000
      fee-tier:
        enabled: true
        refresh-initial-delay-ms: 60000
        refresh-delay-ms: 3600000
        batch-size: 1000
        lookback-days: 30
      algo:
        enabled: true
        claim-batch-size: 100
        scan-delay-ms: 250
        min-interval-seconds: 1
        max-interval-seconds: 86400
        min-duration-seconds: 5
        max-duration-seconds: 86400
