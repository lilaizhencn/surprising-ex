server:
  port: 9095

spring:
  application:
    name: surprising-trigger-provider
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: trigger-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 3
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:1s}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  price:
    consumer:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      topic: surprising.perp.mark.price.v1
      group-id: surprising-trigger-mark-price-v1
      max-age: 3s
      allowed-future-skew: 1s
      concurrency: 1
      max-poll-records: 500
  clients:
    order:
      base-url: http://localhost:9084
  trading:
    trigger:
      kafka:
        bootstrap-servers: localhost:9092
        product-line: LINEAR_PERPETUAL
        product-topics-enabled: false
        group-id: surprising-trigger-v1
        mark-price-topic: surprising.perp.mark.price.v1
        position-events-topic: surprising.account.position.events.v1
        trigger-order-events-topic: surprising.perp.trigger-order.events.v1
        concurrency: 2
        max-poll-records: 500
      execution:
        trigger-batch-size: 200
        stale-triggering-after: 30s
        maintenance-delay-ms: 1000
      outbox:
        batch-size: 200
        publish-delay-ms: 200
        send-timeout: 3s
      redis-index:
        key-prefix: ${TRIGGER_REDIS_KEY_PREFIX:surprising:trigger:v1}
        candidate-batch-size: 400
        rebuild-batch-size: 1000
        reconcile-delay-ms: 10000
        ready-ttl: 30s
        lock-ttl: 30s
