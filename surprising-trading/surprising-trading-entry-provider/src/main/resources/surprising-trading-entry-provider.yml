server:
  port: 9084

spring:
  application:
    name: surprising-trading-entry-provider
  task:
    scheduling:
      pool:
        size: 8
      thread-name-prefix: trading-entry-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 40
      minimum-idle: 6
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:1s}
management:
  health:
    redis:
      enabled: ${TRIGGER_REDIS_INDEX_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  clients:
    order:
      base-url: http://localhost:9084
    trigger:
      base-url: http://localhost:9084
  trading:
    order:
      kafka:
        bootstrap-servers: localhost:9092
        product-line: LINEAR_PERPETUAL
        product-topics-enabled: false
        order-commands-topic: surprising.perp.order.commands.v1
        order-events-topic: surprising.perp.order.events.v1
      outbox:
        batch-size: 1000
        publish-delay-ms: 20
        async-enabled: true
        max-in-flight: 64
        send-timeout: 3s
      risk:
        market-max-slippage-ppm: 10000
        market-max-mark-age-ms: 5000
        limit-price-protection-enabled: true
        limit-price-band-ppm: 50000
        limit-price-max-mark-age-ms: 15000
      fee-tier:
        enabled: true
        refresh-initial-delay-ms: 60000
        refresh-delay-ms: 3600000
        batch-size: 1000
        lookback-days: 30
      algo:
        enabled: true
        claim-batch-size: 100
        scan-delay-ms: 250
        min-interval-seconds: 1
        max-interval-seconds: 86400
        min-duration-seconds: 5
        max-duration-seconds: 86400
    trigger:
      kafka:
        bootstrap-servers: localhost:9092
        product-line: LINEAR_PERPETUAL
        product-topics-enabled: false
        group-id: surprising-trigger-v1
        mark-price-topic: surprising.perp.mark.price.v1
        index-price-topic: surprising.perp.index.price.v1
        last-price-topic: surprising.perp.match.trades.v1
        concurrency: 2
        max-poll-records: 500
      execution:
        trigger-batch-size: 200
        stale-triggering-after: 30s
        maintenance-delay-ms: 1000
      redis-index:
        enabled: ${TRIGGER_REDIS_INDEX_ENABLED:false}
        key-prefix: ${TRIGGER_REDIS_KEY_PREFIX:surprising:trigger:v1}
        candidate-batch-size: 400
        rebuild-batch-size: 1000
        reconcile-delay-ms: 10000
        ready-ttl: 30s
        lock-ttl: 30s
