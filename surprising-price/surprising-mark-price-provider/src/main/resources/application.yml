server:
  port: 9083

spring:
  application:
    name: surprising-mark-price-provider
  task:
    scheduling:
      pool:
        size: 3
      thread-name-prefix: mark-price-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  price:
    consumer:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      topic: surprising.perp.mark.price.v1
      group-id: surprising-mark-price-query-${HOSTNAME:${random.uuid}}
      max-age: 3s
      allowed-future-skew: 1s
      concurrency: 1
      max-poll-records: 500
    mark:
      kafka:
        bootstrap-servers: localhost:9092
        product-line: LINEAR_PERPETUAL
        product-topics-enabled: false
        group-id: surprising-mark-price-v1
        concurrency: 2
        max-poll-records: 500
      topics:
        index-price-topic: surprising.perp.index.price.v1
        book-ticker-topic: surprising.perp.book.ticker.v1
        trade-topic: surprising.perp.trade.events.v1
        funding-rate-topic: surprising.perp.funding.rate.v1
        mark-price-topic: surprising.perp.mark.price.v1
        mark-price-audit-topic: surprising.perp.mark.price.audit.v1
      calculation:
        publish-delay-ms: 1000
        basis-window: 60s
        max-input-age: 15s
        clamp-ratio: 0.03
        default-funding-interval-hours: 8
        scale: 18
      coordination:
        enabled: true
        node-id:
        lease-duration: 15s
      audit:
        retention: 3d
        cleanup-delay-ms: 3600000
        cleanup-batch-size: 10000
        max-batches-per-run: 10
