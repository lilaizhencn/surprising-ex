server:
  port: 9090

spring:
  application:
    name: surprising-insurance-provider
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  insurance:
    coverage:
      scan-delay-ms: 1000
      batch-size: 100
