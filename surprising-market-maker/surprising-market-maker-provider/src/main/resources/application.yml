server:
  port: 9096

spring:
  application:
    name: surprising-market-maker-provider
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  clients:
    account:
      base-url: http://localhost:9086
    instrument:
      base-url: http://localhost:9080
    mark-price:
      base-url: http://localhost:9083
    matching:
      base-url: http://localhost:9085
    order:
      base-url: http://localhost:9084
  market-maker:
    engine:
      enabled: true
      cycle-delay-ms: 100
      node-id:
    coordination:
      enabled: true
      lease-duration: 5s
    quoting:
      order-book-depth: 50
      order-levels: 20
      min-spread-ticks: 20
      level-spacing-ticks: 8
      refresh-threshold-ticks: 1
      max-open-orders-per-account-symbol: 60
      stale-order-max-age: 2s
      max-price-deviation-ppm: 5000
    risk:
      max-inventory-steps: 10000
      max-inventory-skew-ppm: 800000
    trade:
      enabled: true
      account-ids: [900001, 900002, 910001]
      min-interval-ms: 100
      min-quantity-steps: 1
      max-quantity-steps: 20
      slippage-ticks: 20
      inventory-threshold-steps: 5000
    strategies:
      - strategy-id: btc-usdt-mm-a
        enabled: true
        account-ids: [900001, 900002]
        symbols: [BTC-USDT]
        base-quantity-steps: 20
        margin-mode: CROSS
