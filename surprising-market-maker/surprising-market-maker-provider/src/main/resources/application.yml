server:
  port: 9096

spring:
  application:
    name: surprising-market-maker-provider
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: market-maker-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  clients:
    account:
      base-url: http://localhost:9086
    instrument:
      base-url: http://localhost:9080
    mark-price:
      base-url: http://localhost:9083
    matching:
      base-url: http://localhost:9085
    order:
      base-url: http://localhost:9084
  market-maker:
    engine:
      enabled: true
      cycle-delay-ms: 100
      node-id:
    coordination:
      enabled: true
      lease-duration: 5s
    quoting:
      order-book-depth: 50
      order-levels: 20
      min-spread-ticks: 20
      level-spacing-ticks: 8
      refresh-threshold-ticks: 1
      max-open-orders-per-account-symbol: 60
      stale-order-max-age: 2s
      max-price-deviation-ppm: 5000
    risk:
      max-inventory-steps: 10000
      max-inventory-skew-ppm: 800000
    trade:
      enabled: true
      account-ids: [900001, 900002, 910001]
      min-interval-ms: 80
      min-quantity-steps: 1
      max-quantity-steps: 1000
      slippage-ticks: 20
      max-sweep-levels: 5
      inventory-threshold-steps: 5000
    reference-market:
      enabled: false
      websocket-enabled: false
      refresh-interval: 500ms
      max-age: 3s
      request-timeout: 2s
      reconnect-backoff: 5s
      depth-levels: 20
      quantity-scale-ppm: 1000000
      min-quantity-steps: 1
      max-quantity-steps: 1000
      sources:
        - name: BINANCE_USDM
          enabled: true
          product-line: LINEAR_PERPETUAL
          symbol: BTC-USDT
          external-symbol: BTCUSDT
          url: https://fapi.binance.com/fapi/v1/depth?symbol={symbol}&limit=20
          parser: BINANCE_DEPTH
          websocket-url: wss://fstream.binance.com/ws/{externalSymbolLower}@depth20@100ms
          websocket-parser: BINANCE_DEPTH_STREAM
        - name: OKX_SWAP
          enabled: true
          product-line: LINEAR_PERPETUAL
          symbol: BTC-USDT
          external-symbol: BTC-USDT-SWAP
          url: https://www.okx.com/api/v5/market/books?instId={symbol}&sz=20
          parser: OKX_BOOKS
          websocket-url: wss://ws.okx.com:8443/ws/v5/public
          websocket-subscribe-message: '{"op":"subscribe","args":[{"channel":"books","instId":"{externalSymbol}"}]}'
          websocket-parser: OKX_BOOKS_WS
        - name: BYBIT_LINEAR
          enabled: true
          product-line: LINEAR_PERPETUAL
          symbol: BTC-USDT
          external-symbol: BTCUSDT
          url: https://api.bybit.com/v5/market/orderbook?category=linear&symbol={symbol}&limit=50
          parser: BYBIT_ORDERBOOK
          websocket-url: wss://stream.bybit.com/v5/public/linear
          websocket-subscribe-message: '{"op":"subscribe","args":["orderbook.50.{externalSymbol}"]}'
          websocket-parser: BYBIT_ORDERBOOK_WS
    strategies:
      - strategy-id: btc-usdt-mm-a
        product-line: LINEAR_PERPETUAL
        enabled: true
        account-ids: [900001, 900002]
        symbols: [BTC-USDT]
        base-quantity-steps: 20
        margin-mode: CROSS
