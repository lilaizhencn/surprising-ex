server:
  port: 9089

spring:
  application:
    name: surprising-funding-provider
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: funding-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  price:
    consumer:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      topic: surprising.perp.mark.price.v1
      group-id: surprising-funding-mark-price-${HOSTNAME:${random.uuid}}
      max-age: 10s
      allowed-future-skew: 1s
      concurrency: 1
      max-poll-records: 500
  funding:
    kafka:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      funding-rate-topic: surprising.perp.funding.rate.v1
      cache-group-id: surprising-funding-rate-cache-${HOSTNAME:${random.uuid}}
      concurrency: 1
      command-results-concurrency: 4
      max-poll-records: 500
    calculation:
      publish-delay-ms: 1000
      max-mark-age: 10s
      max-rate-age: 5s
    settlement:
      settle-delay-ms: 1000
      batch-size: 20
    coordination:
      enabled: true
      node-id:
      lease-duration: 15s
