server:
  port: 9088

spring:
  application:
    name: surprising-margin-ops-provider
  task:
    scheduling:
      pool:
        size: 10
      thread-name-prefix: margin-ops-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  price:
    consumer:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      topic: surprising.perp.mark.price.v1
      group-id: surprising-margin-ops-mark-price-${HOSTNAME:${random.uuid}}
      max-age: 10s
      allowed-future-skew: 1s
      concurrency: 1
      max-poll-records: 500
  clients:
    risk:
      base-url: http://localhost:9088
  risk:
    kafka:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      group-id: surprising-risk-v1
      position-events-topic: surprising.account.position.events.v1
      account-risk-events-topic: surprising.risk.account.events.v1
      position-risk-events-topic: surprising.risk.position.events.v1
      liquidation-candidates-topic: surprising.perp.liquidation.candidates.v1
      concurrency: 2
      max-poll-records: 500
    calculation:
      scan-delay-ms: 1000
      warning-margin-ratio-ppm: 800000
      liquidation-margin-ratio-ppm: 1000000
      max-mark-age: 10s
      scan-batch-size: 500
    coordination:
      enabled: true
      node-id:
      lease-duration: 15s
    outbox:
      batch-size: 1000
      publish-delay-ms: 20
      async-enabled: true
      max-in-flight: 32
      max-rows-per-key: 32
      send-timeout: 3s
  liquidation:
    kafka:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      group-id: surprising-liquidation-v1
      liquidation-candidates-topic: surprising.perp.liquidation.candidates.v1
      match-results-topic: surprising.perp.match.results.v1
      order-commands-topic: surprising.perp.order.commands.v1
      order-events-topic: surprising.perp.order.events.v1
      concurrency: 2
      max-poll-records: 500
    outbox:
      batch-size: 200
      publish-delay-ms: 100
      send-timeout: 3s
    sizing:
      normal-close-ratio-ppm: 500000
      severe-margin-ratio-ppm: 1500000
      severe-close-ratio-ppm: 750000
      full-close-margin-ratio-ppm: 3000000
      min-close-steps: 1
    risk:
      max-snapshot-age: 5s
    execution:
      enabled: true
      liquidation-fee-rate-ppm: 3000
  funding:
    kafka:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      funding-rate-topic: surprising.perp.funding.rate.v1
      cache-group-id: surprising-funding-rate-cache-${HOSTNAME:${random.uuid}}
      concurrency: 1
      max-poll-records: 500
    calculation:
      publish-delay-ms: 1000
      max-mark-age: 10s
      max-rate-age: 5s
    settlement:
      settle-delay-ms: 1000
      batch-size: 20
    coordination:
      enabled: true
      node-id:
      lease-duration: 15s
  insurance:
    kafka:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      group-id: surprising-insurance-v1
      liquidation-fee-events-topic: surprising.account.liquidation-fee.events.v1
      concurrency: 2
      max-poll-records: 500
    coverage:
      scan-delay-ms: 1000
      batch-size: 100
  adl:
    kafka:
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
    scanner:
      scan-delay-ms: 1000
      min-deficit-age-ms: 10000
      max-mark-age-ms: 5000
      batch-size: 50
      max-deleverages-per-deficit: 20
      candidate-multiplier: 5
