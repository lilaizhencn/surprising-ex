server:
  port: 9090

spring:
  application:
    name: surprising-insurance-provider
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: insurance-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  insurance:
    kafka:
      bootstrap-servers: localhost:9092
      group-id: surprising-insurance-v1
      liquidation-fee-events-topic: surprising.account.liquidation-fee.events.v1
      concurrency: 2
      max-poll-records: 500
    coverage:
      scan-delay-ms: 1000
      batch-size: 100
