server:
  port: 9087

spring:
  application:
    name: surprising-risk-provider
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: risk-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  risk:
    kafka:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      group-id: surprising-risk-v1
      position-events-topic: surprising.account.position.events.v1
      account-risk-events-topic: surprising.risk.account.events.v1
      position-risk-events-topic: surprising.risk.position.events.v1
      liquidation-candidates-topic: surprising.perp.liquidation.candidates.v1
      concurrency: 2
      max-poll-records: 500
    calculation:
      scan-delay-ms: 1000
      warning-margin-ratio-ppm: 800000
      liquidation-margin-ratio-ppm: 1000000
      max-mark-age: 10s
      scan-batch-size: 500
    coordination:
      enabled: true
      node-id:
      lease-duration: 15s
    outbox:
      batch-size: 1000
      publish-delay-ms: 20
      async-enabled: true
      max-in-flight: 32
      max-rows-per-key: 32
      send-timeout: 3s
