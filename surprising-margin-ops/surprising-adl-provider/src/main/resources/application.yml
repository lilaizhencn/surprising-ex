server:
  port: 9091

spring:
  application:
    name: surprising-adl-provider
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: adl-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  price:
    consumer:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      topic: surprising.perp.mark.price.v1
      group-id: surprising-adl-mark-price-${HOSTNAME:${random.uuid}}
      max-age: 5s
      allowed-future-skew: 1s
      concurrency: 1
      max-poll-records: 500
  adl:
    scanner:
      scan-delay-ms: 1000
      min-deficit-age-ms: 10000
      max-mark-age-ms: 5000
      batch-size: 50
      max-deleverages-per-deficit: 20
      candidate-multiplier: 5
