server:
  port: 9080

spring:
  application:
    name: surprising-instrument-provider
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: instrument-scheduler-
      shutdown:
        await-termination: true
        await-termination-period: 10s
  datasource:
    url: jdbc:postgresql://localhost:5432/surprising_exchange
    username: surprising
    password: surprising
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  instrument:
    kafka:
      bootstrap-servers: localhost:9092
      events-topic: surprising.instrument.events.v1
    lifecycle:
      enabled: true
      poll-delay-ms: 1000
      batch-size: 100
