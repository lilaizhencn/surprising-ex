server:
  port: 9093

spring:
  application:
    name: surprising-websocket-provider
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

surprising:
  websocket:
    kafka:
      bootstrap-servers: localhost:9092
      product-line: LINEAR_PERPETUAL
      product-topics-enabled: false
      # Horizontal fanout requires each WebSocket node to receive public market data locally.
      # Keep this stable and unique per pod/instance; using the same group across all nodes would
      # deliver each Kafka record to only one node, while using a fresh random group on every restart
      # leaves stale consumer groups in Kafka and makes lag dashboards noisy.
      group-id: surprising-websocket-${HOSTNAME:${random.uuid}}
      concurrency: 2
      max-poll-records: 1000
      candle-topic: surprising.perp.candle.events.v1
      trade-topic: surprising.perp.trade.events.v1
      order-book-depth-topic: surprising.perp.orderbook.depth.v1
      index-price-topic: surprising.perp.index.price.v1
      mark-price-topic: surprising.perp.mark.price.v1
      funding-rate-topic: surprising.perp.funding.rate.v1
      order-events-topic: surprising.perp.order.events.v1
      trigger-order-events-topic: surprising.perp.trigger-order.events.v1
      match-results-topic: surprising.perp.match.results.v1
      match-trades-topic: surprising.perp.match.trades.v1
      position-events-topic: surprising.account.position.events.v1
      account-risk-events-topic: surprising.risk.account.events.v1
      position-risk-events-topic: surprising.risk.position.events.v1
    session:
      max-subscriptions: 200
      outbound-queue-capacity: 1000
      send-timeout: 5s
    security:
      user-id-header: X-User-Id
      allow-query-user-id-fallback: true
      issuer: surprising-ex-gateway
      jwt-secret: ${SURPRISING_WEBSOCKET_JWT_SECRET:local-dev-change-me-surprising-ex-gateway-secret-2026}
      allowed-origins:
        - "*"
    fanout:
      candle-partial-coalesce-window: 250ms
