<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Surprising Exchange 交易系统关键功能全链路架构图</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10141b;
      --panel: #171d27;
      --panel-2: #1d2634;
      --text: #eef3f8;
      --muted: #a9b6c6;
      --line: #2f3b4a;
      --http: #58a6ff;
      --db: #47c38e;
      --kafka: #f2a444;
      --risk: #ef6351;
      --ws: #9b7cff;
      --scan: #cbd5e1;
      --price: #49c5b6;
      --warn: #ffd166;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .shell {
      display: grid;
      grid-template-rows: 74px 1fr;
      height: 100%;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid #253142;
      background: #111821;
      box-sizing: border-box;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 720;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: 1px solid #35465c;
      background: #182232;
      color: var(--text);
      border-radius: 7px;
      padding: 8px 11px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
    }

    button:hover {
      background: #21304a;
      border-color: #4c6380;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: calc(100vh - 74px);
      overflow: hidden;
      cursor: grab;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        var(--bg);
      background-size: 32px 32px;
    }

    #stage.dragging {
      cursor: grabbing;
      user-select: none;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .lane {
      fill: rgba(255, 255, 255, 0.022);
      stroke: #273243;
      stroke-width: 1;
    }

    .lane-title {
      fill: #d7e2ef;
      font-size: 25px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .lane-note {
      fill: #91a1b5;
      font-size: 16px;
      letter-spacing: 0;
    }

    .node rect {
      stroke-width: 2;
      rx: 10;
      ry: 10;
      filter: drop-shadow(0 16px 18px rgba(0, 0, 0, 0.25));
    }

    .box {
      box-sizing: border-box;
      height: 100%;
      padding: 15px 16px;
      color: var(--text);
      overflow: hidden;
      font-size: 15px;
      line-height: 1.36;
    }

    .box h2,
    .box h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.22;
      font-weight: 780;
      letter-spacing: 0;
    }

    .box h2 {
      font-size: 20px;
    }

    .box p {
      margin: 5px 0;
      color: #cfdae7;
    }

    .box ul {
      margin: 7px 0 0;
      padding-left: 16px;
      color: #cfdae7;
    }

    .box li {
      margin: 3px 0;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      color: #f7fbff;
      font-size: 0.92em;
    }

    .chip {
      display: inline-block;
      margin: 0 4px 4px 0;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #e8f0fa;
      background: rgba(255, 255, 255, 0.07);
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .n-http rect { fill: #12243a; stroke: var(--http); }
    .n-db rect { fill: #122d25; stroke: var(--db); }
    .n-kafka rect { fill: #322615; stroke: var(--kafka); }
    .n-core rect { fill: #1d2740; stroke: #77a7ff; }
    .n-risk rect { fill: #341c1c; stroke: var(--risk); }
    .n-ws rect { fill: #251f3d; stroke: var(--ws); }
    .n-price rect { fill: #122f2e; stroke: var(--price); }
    .n-note rect { fill: #17202d; stroke: #60708a; }

    .arrow {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .http { stroke: var(--http); }
    .db { stroke: var(--db); }
    .kafka { stroke: var(--kafka); }
    .risk { stroke: var(--risk); }
    .ws { stroke: var(--ws); }
    .price { stroke: var(--price); }
    .scan {
      stroke: var(--scan);
      stroke-dasharray: 12 10;
    }

    .edge-label {
      fill: #111821;
      stroke: rgba(255, 255, 255, 0.16);
      stroke-width: 1;
      rx: 5;
      ry: 5;
    }

    .edge-text {
      fill: #eef3f8;
      font-size: 14px;
      font-weight: 640;
      letter-spacing: 0;
    }

    .seq {
      fill: #111821;
      stroke: #8fb3d9;
      stroke-width: 2;
    }

    .seq-text {
      fill: #f8fbff;
      font-size: 17px;
      font-weight: 800;
    }

    .legend text,
    .foot text {
      fill: #cfd8e5;
      font-size: 15px;
      letter-spacing: 0;
    }

    .legend-title,
    .foot-title {
      fill: #f7fbff;
      font-size: 20px;
      font-weight: 760;
      letter-spacing: 0;
    }

    @media (max-width: 860px) {
      .subtitle {
        display: none;
      }

      header {
        align-items: flex-start;
      }

      button {
        padding: 7px 9px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div>
      <h1>Surprising Exchange 交易系统关键功能全链路架构图</h1>
      <div class="subtitle">用户下单 -> orderCommand -> 撮合 -> 成交结算 -> 持仓/风控 -> 强平/保险/ADL -> WebSocket 回报</div>
    </div>
    <div class="controls" aria-label="diagram controls">
      <button type="button" id="zoomIn">放大</button>
      <button type="button" id="zoomOut">缩小</button>
      <button type="button" id="reset">重置</button>
      <button type="button" id="fullscreen">全屏</button>
    </div>
  </header>

  <main id="stage" aria-label="full screen architecture diagram">
    <svg id="diagram" role="img" aria-labelledby="diagramTitle diagramDesc" viewBox="0 0 3000 1900">
      <title id="diagramTitle">Surprising Exchange 交易系统关键功能全链路架构图</title>
      <desc id="diagramDesc">展示用户下单、订单命令、撮合、账户结算、持仓、风控、爆仓强平、保险基金、ADL、价格、WebSocket 和性能边界。</desc>

      <defs>
        <marker id="arrow-http" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 14 7 L 0 14 z" fill="#58a6ff"></path>
        </marker>
        <marker id="arrow-db" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 14 7 L 0 14 z" fill="#47c38e"></path>
        </marker>
        <marker id="arrow-kafka" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 14 7 L 0 14 z" fill="#f2a444"></path>
        </marker>
        <marker id="arrow-risk" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 14 7 L 0 14 z" fill="#ef6351"></path>
        </marker>
        <marker id="arrow-ws" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 14 7 L 0 14 z" fill="#9b7cff"></path>
        </marker>
        <marker id="arrow-price" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 14 7 L 0 14 z" fill="#49c5b6"></path>
        </marker>
        <marker id="arrow-scan" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 14 7 L 0 14 z" fill="#cbd5e1"></path>
        </marker>
      </defs>

      <rect x="30" y="35" width="2940" height="1815" rx="18" class="lane"></rect>
      <text x="60" y="80" class="lane-title">全链路交易主路径</text>
      <text x="60" y="112" class="lane-note">关键原则：用户请求只在 order/account/risk 等服务落库；跨服务通信走 Outbox + Kafka；资金/持仓以 PostgreSQL 事务为准，缓存不得作为资金真相。</text>

      <rect x="55" y="135" width="2920" height="560" rx="14" class="lane"></rect>
      <text x="75" y="170" class="lane-title">1. 用户下单到 orderCommand 进入撮合</text>
      <text x="75" y="198" class="lane-note">从 HTTP 到撮合命令的来源在图中标出：Gateway -> OrderController -> OrderService.place -> trading_outbox_events -> Kafka topic -> MatchingCommandConsumer。</text>

      <g class="node n-http">
        <rect x="70" y="235" width="265" height="245"></rect>
        <foreignObject x="70" y="235" width="265" height="245">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>用户 / 客户端</h2>
            <p>Web、Flutter、API bot、做市服务都按真实接口调用。</p>
            <p><span class="chip">place</span><span class="chip">batch</span><span class="chip">amend</span><span class="chip">cancel</span><span class="chip">cancel-open</span></p>
            <p class="mono">POST /api/v1/gateway/trading</p>
            <p class="mono">POST /api/v1/gateway/trading-trigger</p>
          </div>
        </foreignObject>
      </g>

      <g class="node n-http">
        <rect x="390" y="220" width="300" height="275"></rect>
        <foreignObject x="390" y="220" width="300" height="275">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>GatewayProvider</h2>
            <p>代码：<span class="mono">GatewayProxyController</span></p>
            <ul>
              <li>校验 Bearer / 私有路由身份</li>
              <li>转发 trace-id、用户身份 header</li>
              <li>路由 <span class="mono">trading</span> 到 <span class="mono">:9084/api/v1/trading/orders</span></li>
              <li>路由 <span class="mono">trading-trigger</span> 到 <span class="mono">:9084/api/v1/trading/trigger-orders</span></li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-http">
        <rect x="735" y="175" width="350" height="365"></rect>
        <foreignObject x="735" y="175" width="350" height="365">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>TradingEntryProvider</h2>
            <p>代码：<span class="mono">OrderController</span> + <span class="mono">OrderService</span></p>
            <ul>
              <li><span class="mono">place()</span>、<span class="mono">placeBatch()</span>、<span class="mono">amend()</span>、<span class="mono">cancel()</span></li>
              <li>锁用户持仓模式、锁用户+symbol 保证金模式</li>
              <li>校验 instrument、价格精度、手续费、reduce-only、post-only</li>
              <li>开仓预占保证金；拒单也落订单事件</li>
              <li><span class="mono">enqueueCommand(order, PLACE/CANCEL)</span> 生成 orderCommand</li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-db">
        <rect x="735" y="565" width="350" height="105"></rect>
        <foreignObject x="735" y="565" width="350" height="105">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h3>Order DB 事务边界</h3>
            <p><span class="mono">trading_orders</span>、<span class="mono">trading_order_events</span>、<span class="mono">account_margin_reservations</span>、<span class="mono">trading_outbox_events</span></p>
          </div>
        </foreignObject>
      </g>

      <g class="node n-kafka">
        <rect x="1135" y="270" width="330" height="220"></rect>
        <foreignObject x="1135" y="270" width="330" height="220">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>OutboxPublisher + Kafka</h2>
            <p>Order command topic：</p>
            <p class="mono">surprising.perp.order.commands.v1</p>
            <ul>
              <li>event key = <span class="mono">symbol</span></li>
              <li>分区保证同 symbol 顺序</li>
              <li>至少一次投递，下游靠 commandId/orderId 幂等</li>
              <li>Outbox claim 使用 <span class="mono">FOR UPDATE SKIP LOCKED</span></li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-core">
        <rect x="1515" y="175" width="355" height="365"></rect>
        <foreignObject x="1515" y="175" width="355" height="365">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>MatchingProvider</h2>
            <p>代码：<span class="mono">MatchingCommandConsumer</span> + <span class="mono">MatchingService</span></p>
            <ul>
              <li>KafkaListener 消费 orderCommand</li>
              <li>校验 Kafka key == payload symbol</li>
              <li>symbol stripe lock 保证同 symbol 本地串行</li>
              <li>MARKET 用 mark price + slippage 保护价</li>
              <li>post-only、自成交、instrumentVersion 快速拒绝</li>
              <li>核心撮合：<span class="mono">exchange-core</span> 内存 order book</li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-db">
        <rect x="1515" y="565" width="355" height="110"></rect>
        <foreignObject x="1515" y="565" width="355" height="110">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h3>撮合结果持久化</h3>
            <p><span class="mono">trading_match_results</span>、<span class="mono">trading_match_trades</span>、<span class="mono">trading_outbox_events</span></p>
          </div>
        </foreignObject>
      </g>

      <g class="node n-kafka">
        <rect x="1920" y="260" width="380" height="245"></rect>
        <foreignObject x="1920" y="260" width="380" height="245">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>撮合事件 Topics</h2>
            <p class="mono">surprising.perp.match.results.v1</p>
            <p class="mono">surprising.perp.match.trades.v1</p>
            <p class="mono">surprising.perp.orderbook.depth.v1</p>
            <ul>
              <li>结果给订单生命周期、强平生命周期、WebSocket</li>
              <li>成交明细给账户结算和 LAST_PRICE 条件单</li>
              <li>depth 给行情和 mark-price 计算</li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-db">
        <rect x="1920" y="545" width="420" height="325"></rect>
        <foreignObject x="1920" y="545" width="420" height="325">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>AccountProvider 账户结算</h2>
            <p>代码：<span class="mono">MatchTradeConsumer</span> -> <span class="mono">AccountService.processTradeIfNew</span></p>
            <ul>
              <li><span class="mono">(symbol, tradeId)</span> 幂等：先写 <span class="mono">account_processed_trades</span></li>
              <li>同一事务内处理 taker + maker 两边</li>
              <li>锁定 <span class="mono">account_positions</span>，计算 closeSteps/openSteps</li>
              <li>平仓：结算 realized PnL、释放 position/order margin</li>
              <li>开仓：消费预占保证金到 position margin</li>
              <li>手续费、强平费、亏损 deficit、position update outbox 都在这里落账</li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-db">
        <rect x="1920" y="900" width="420" height="170"></rect>
        <foreignObject x="1920" y="900" width="420" height="170">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h3>账户表与资金真相</h3>
            <p><span class="mono">account_balances</span>、<span class="mono">account_product_balances</span>、<span class="mono">account_position_margins</span>、<span class="mono">account_ledger_entries</span>、<span class="mono">account_deficits</span>、<span class="mono">account_outbox_events</span></p>
          </div>
        </foreignObject>
      </g>

      <g class="node n-ws">
        <rect x="2580" y="275" width="360" height="365"></rect>
        <foreignObject x="2580" y="275" width="360" height="365">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>WebSocketProvider</h2>
            <p>代码：<span class="mono">KafkaFanoutConsumer</span></p>
            <ul>
              <li>public：<span class="mono">depth</span>、mark、index</li>
              <li>private：orders、matches、positions</li>
              <li><span class="mono">executionReports</span> 统一推 order event / match result / trade</li>
              <li><span class="mono">accountRisk</span>、<span class="mono">positionRisk</span> 来自 risk outbox</li>
              <li>订阅按认证 userId 隔离，不串号</li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <rect x="55" y="720" width="2920" height="465" rx="14" class="lane"></rect>
      <text x="75" y="755" class="lane-title">2. 持仓产生、持仓操作、条件单和算法单</text>
      <text x="75" y="783" class="lane-note">持仓只由 account 结算生成和更新；TP/SL、TWAP、Iceberg 最终都回到普通订单路径，避免绕开撮合和资金账。</text>

      <g class="node n-price">
        <rect x="70" y="820" width="295" height="250"></rect>
        <foreignObject x="70" y="820" width="295" height="250">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>价格链路</h2>
            <ul>
              <li>IndexProvider 拉外部指数</li>
              <li>MarkPriceProvider 消费 index/depth/trade</li>
              <li>mark price 单消息同时携带结果与审计输入</li>
            </ul>
            <p class="mono">surprising.perp.index.price.v1</p>
            <p class="mono">surprising.perp.mark.price.v1</p>
          </div>
        </foreignObject>
      </g>

      <g class="node n-http">
        <rect x="735" y="815" width="350" height="300"></rect>
        <foreignObject x="735" y="815" width="350" height="300">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>TriggerProvider TP/SL</h2>
            <p>代码：<span class="mono">TriggerOrderService</span></p>
            <ul>
              <li>接收 MARK_PRICE / INDEX_PRICE / LAST_PRICE / TRAILING_STOP</li>
              <li>下单时锁仓位并校验待平容量</li>
              <li>批量可 atomic；支持 OCO，不双算 sibling 数量</li>
              <li>触发时 claim due row，取消 OCO sibling</li>
              <li>通过 <span class="mono">OrderRpcApi.place</span> 创建 reduce-only 平仓单</li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-http">
        <rect x="735" y="1138" width="350" height="255"></rect>
        <foreignObject x="735" y="1138" width="350" height="255">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>Algo Orders</h2>
            <p>代码：<span class="mono">AlgoOrderService</span></p>
            <ul>
              <li>TWAP / Iceberg 是 order-provider 父单，不进 exchange-core</li>
              <li>定时扫描 due parent，生成普通 child order</li>
              <li>child 继续走 OrderService -> orderCommand -> Matching -> Account</li>
              <li>取消父单会取消 active children</li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-db">
        <rect x="1515" y="795" width="355" height="270"></rect>
        <foreignObject x="1515" y="795" width="355" height="270">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>持仓操作入口</h2>
            <ul>
              <li>开仓/平仓：只能由成交结算驱动</li>
              <li>手动 isolated margin add/remove：AccountService 锁仓位和风险快照</li>
              <li>平仓后 ReduceOnlyOrderPruner 裁剪错误方向/超量 reduce-only 单</li>
              <li>position-mode / margin-mode 切换会检查仓位、订单、触发单、算法单和未结算状态</li>
            </ul>
          </div>
        </foreignObject>
      </g>

      <g class="node n-db">
        <rect x="1515" y="1095" width="355" height="250"></rect>
        <foreignObject x="1515" y="1095" width="355" height="250">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>Funding / 费用结算</h2>
            <ul>
              <li>FundingProvider 定时发布 due funding rate</li>
              <li>账户侧按持仓结算资金费并写 ledger</li>

        <foreignObject x="70" y="1460" width="2250" height="260">
          <div xmlns="http://www.w3.org/1999/xhtml" class="box">
            <h2>关键实现索引、资金安全边界和当前性能结论</h2>
            <p><strong>代码入口：</strong>
              <span class="mono">OrderService.place/enqueueCommand</span>、
              <span class="mono">MatchingCommandConsumer.onCommand</span>、
              <span class="mono">MatchingService.process/saveAndPublish</span>、
              <span class="mono">MatchTradeConsumer.onTrade</span>、
              <span class="mono">AccountService.processTradeIfNew/applyTradeSide</span>、
              <span class="mono">RiskService.scan/scanPositionUpdate</span>、
              <span class="mono">LiquidationService.processCandidate</span>、
              <span class="mono">InsuranceService.coverDeficits</span>、
              <span class="mono">AdlService.processResidualDeficits</span>。
            </p>
            <p><strong>资金正确性：</strong>账户资金、保证金、仓位、亏损和保险覆盖都落 PostgreSQL 事务表；Kafka/Outbox 允许至少一次投递，但消费者用 commandId、orderId、tradeId、candidateId、referenceId 做幂等。任何资金修改都必须进入 ledger/audit 表。</p>
            <p><strong>L4 压测结论：</strong>真实 gateway/order/matching/account/websocket 链路，10k taker 已全部成交并由 account 结算；account lag 最终归零，trading/account outbox 清空；负余额、deficit 异常聚合、invalid open interest 均为 0。当前长尾主要卡在 order DB/outbox/Kafka/account 写库串联，exchange-core 本身不是主瓶颈。</p>
            <p><strong>后续性能方向：</strong>account 批处理/SQL round-trip 合并、按 symbol/asset 分区结算、ledger/outbox 批量写、减少重复快照查询；修改后必须继续跑真实全链路压测和资金守恒断言，不能只跑单元测试。</p>
          </div>
        </foreignObject>
      </g>

<script>
  const stage = document.getElementById("stage");
  const svg = document.getElementById("diagram");
  const initial = { x: 0, y: 0, w: 3000, h: 1900 };
  const viewBox = { ...initial };
  let dragging = false;
  let last = { x: 0, y: 0 };

  function applyViewBox() {
    svg.setAttribute("viewBox", `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  }

  function zoomAt(clientX, clientY, factor) {
    const rect = svg.getBoundingClientRect();
    const px = (clientX - rect.left) / rect.width;
    const py = (clientY - rect.top) / rect.height;
    const worldX = viewBox.x + px * viewBox.w;
    const worldY = viewBox.y + py * viewBox.h;
    const nextW = Math.max(600, Math.min(initial.w * 1.7, viewBox.w * factor));
    const nextH = nextW * (initial.h / initial.w);
    viewBox.x = worldX - px * nextW;
    viewBox.y = worldY - py * nextH;
    viewBox.w = nextW;
    viewBox.h = nextH;
    applyViewBox();
  }

  stage.addEventListener("wheel", (event) => {
    event.preventDefault();
    zoomAt(event.clientX, event.clientY, event.deltaY < 0 ? 0.88 : 1.14);
  }, { passive: false });

  stage.addEventListener("pointerdown", (event) => {
    dragging = true;
    last = { x: event.clientX, y: event.clientY };
    stage.classList.add("dragging");
    stage.setPointerCapture(event.pointerId);
  });

  stage.addEventListener("pointermove", (event) => {
    if (!dragging) return;
    const rect = svg.getBoundingClientRect();
    const dx = (event.clientX - last.x) * viewBox.w / rect.width;
    const dy = (event.clientY - last.y) * viewBox.h / rect.height;
    viewBox.x -= dx;
    viewBox.y -= dy;
    last = { x: event.clientX, y: event.clientY };
    applyViewBox();
  });

  function stopDrag(event) {
    dragging = false;
    stage.classList.remove("dragging");
    if (event && event.pointerId !== undefined) {
      try {
        stage.releasePointerCapture(event.pointerId);
      } catch {
        // The pointer may already be released by the browser when leaving fullscreen.
      }
    }
  }

  stage.addEventListener("pointerup", stopDrag);
  stage.addEventListener("pointercancel", stopDrag);

  document.getElementById("zoomIn").addEventListener("click", () => zoomAt(window.innerWidth / 2, window.innerHeight / 2, 0.82));
  document.getElementById("zoomOut").addEventListener("click", () => zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1.2));
  document.getElementById("reset").addEventListener("click", () => {
    Object.assign(viewBox, initial);
    applyViewBox();
  });
  document.getElementById("fullscreen").addEventListener("click", async () => {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
    } else {
      await document.exitFullscreen();
    }
  });
</script>
